name: CI/CD Pipeline - Data Pipeline Compliance

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  PYTHON_VERSION: '3.9'
  JAVA_VERSION: '11'

jobs:
  # ===========================================
  # JOB: TESTES
  # ===========================================
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-html

      - name: Run unit tests
        run: |
          pytest tests/ -m unit --cov=ingestion --cov=transformation --cov-report=xml --cov-report=html

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results
          path: |
            htmlcov/
            coverage.xml

  # ===========================================
  # JOB: LINTING E FORMATAÇÃO
  # ===========================================
  lint:
    name: Lint and Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy

      - name: Run flake8
        run: flake8 ingestion/ orchestration/ validation/ tests/

      - name: Check black formatting
        run: black --check ingestion/ orchestration/ validation/ tests/

      - name: Check isort
        run: isort --check-only ingestion/ orchestration/ validation/ tests/

      - name: Run mypy
        run: mypy ingestion/ orchestration/ validation/

  # ===========================================
  # JOB: TESTES DE INTEGRAÇÃO
  # ===========================================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test, lint]

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run integration tests
        run: |
          pytest tests/ -m integration --tb=short
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_db
          REDIS_URL: redis://localhost:6379/0

  # ===========================================
  # JOB: BUILD E PUSH DE IMAGENS
  # ===========================================
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [integration-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ingestion image
        uses: docker/build-push-action@v5
        with:
          context: ./ingestion
          file: ./ingestion/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/compliance-ingestion:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/compliance-ingestion:${{ github.sha }}

      - name: Build and push transformation image
        uses: docker/build-push-action@v5
        with:
          context: ./transformation
          file: ./transformation/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/compliance-transformation:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/compliance-transformation:${{ github.sha }}

  # ===========================================
  # JOB: DEPLOY PARA STAGING
  # ===========================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Adicionar comandos de deploy específicos aqui
          # Exemplo: kubectl apply, docker-compose up, etc.

      - name: Run smoke tests
        run: |
          echo "Running smoke tests on staging..."
          # Adicionar testes de smoke aqui

  # ===========================================
  # JOB: DEPLOY PARA PRODUÇÃO
  # ===========================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Adicionar comandos de deploy específicos aqui

      - name: Run production validation
        run: |
          echo "Running production validation..."
          # Adicionar validações de produção aqui
