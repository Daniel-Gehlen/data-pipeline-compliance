# ===========================================
# CONFIGURAÇÃO DO GREAT EXPECTATIONS
# ===========================================

config_version: 3.0

# Configurações do projeto
project_name: data_pipeline_compliance
expectations_store_name: expectations
validations_store_name: validations
evaluation_parameter_store_name: evaluation_parameters
data_docs_sites: data_docs
plugins_directory: plugins/

# Configuração de stores
stores:
  expectations_store:
    class_name: ExpectationsStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: expectations/

  validations_store:
    class_name: ValidationsStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: uncommitted/validations/

  evaluation_parameter_store:
    class_name: EvaluationParameterStore

  checkpoint_store:
    class_name: CheckpointStore
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: checkpoints/

# Configuração de Data Docs
data_docs_sites:
  local_site:
    class_name: SiteBuilder
    show_how_to_buttons: true
    store_backend:
      class_name: TupleFilesystemStoreBackend
      base_directory: uncommitted/data_docs/local_site/
    site_index_builder:
      class_name: DefaultSiteIndexBuilder

# Configuração de fluent datasources
fluent_datasources:
  spark_delta_datasource:
    type: spark
    assets:
      compliance_raw:
        type: dataframe
        batching_regex: .*
      compliance_staging:
        type: dataframe
        batching_regex: .*
      compliance_intermediate:
        type: dataframe
        batching_regex: .*
      compliance_mart:
        type: dataframe
        batching_regex: .*

# Configuração de variáveis de ambiente
config_variables_file_path: uncommitted/config_variables.yml
